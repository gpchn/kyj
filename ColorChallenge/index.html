<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色差挑战 | Color Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }
        
        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
        }
        
        .header {
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        
        .title {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a8dadc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: clamp(12px, 3vw, 16px);
            color: rgba(255, 255, 255, 0.6);
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: clamp(20px, 5vw, 40px);
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 700;
            color: #4ecdc4;
        }
        
        .stat-label {
            font-size: clamp(10px, 2.5vw, 12px);
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .game-board {
            display: grid;
            gap: clamp(8px, 2vw, 12px);
            margin-bottom: 20px;
            padding: clamp(15px, 4vw, 30px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        
        .color-block {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            min-width: 40px;
            min-height: 40px;
        }
        
        .color-block:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .color-block:active {
            transform: scale(0.95);
        }
        
        .color-block.correct {
            border-color: #4ecdc4;
            animation: correctPulse 0.5s ease;
        }
        
        .color-block.wrong {
            border-color: #ff6b6b;
            animation: wrongShake 0.5s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        .hint-text {
            font-size: clamp(14px, 3.5vw, 18px);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .difficulty-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .difficulty-bar {
            width: clamp(120px, 30vw, 200px);
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .difficulty-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #ff6b6b);
            transition: width 0.3s ease;
        }
        
        .difficulty-label {
            font-size: clamp(10px, 2.5vw, 12px);
            color: rgba(255, 255, 255, 0.5);
        }
        
        .combo-display {
            font-size: clamp(18px, 5vw, 28px);
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            opacity: 0;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        @keyframes scoreFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%) scale(1.5);
            }
        }
        
        @keyframes flashFade {
            0% { opacity: 0.3; }
            100% { opacity: 0; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        @keyframes levelUpPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }
        
        .lives {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        
        .heart {
            width: clamp(18px, 5vw, 24px);
            height: clamp(18px, 5vw, 24px);
            fill: #ff6b6b;
            transition: all 0.3s ease;
        }
        
        .heart.lost {
            fill: rgba(255, 255, 255, 0.2);
            transform: scale(0.8);
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: clamp(25px, 6vw, 40px) clamp(30px, 8vw, 60px);
            border-radius: 16px;
            text-align: center;
            z-index: 100;
            display: none;
            max-width: 90vw;
            width: auto;
        }
        
        .message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .message-title {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .message-text {
            font-size: clamp(14px, 3.5vw, 16px);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }
        
        .btn {
            padding: clamp(12px, 3vw, 15px) clamp(30px, 8vw, 40px);
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(14px, 3.5vw, 16px);
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .start-screen {
            text-align: center;
            padding: 20px 0;
        }
        
        .start-screen .title {
            font-size: clamp(40px, 10vw, 64px);
            margin-bottom: 15px;
        }
        
        .start-screen .description {
            font-size: clamp(14px, 3.5vw, 18px);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .start-screen .instructions {
            background: rgba(255, 255, 255, 0.05);
            padding: clamp(20px, 5vw, 30px);
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .start-screen .instructions h3 {
            margin-bottom: 12px;
            color: #4ecdc4;
            text-align: center;
            font-size: clamp(14px, 3.5vw, 16px);
        }
        
        .start-screen .instructions p {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.8;
            font-size: clamp(12px, 3vw, 14px);
        }
        
        #game-screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }
        
        @media (max-width: 480px) {
            .game-container {
                padding: 15px;
            }
            
            .stats-bar {
                gap: 15px;
            }
            
            .game-board {
                padding: 15px;
                gap: 6px;
            }
        }
        
        @media (max-height: 600px) {
            .header {
                margin-bottom: 10px;
            }
            
            .stats-bar {
                margin-bottom: 10px;
            }
            
            .game-board {
                margin-bottom: 10px;
                padding: 15px;
            }
            
            .lives {
                margin-bottom: 10px;
            }
            
            .difficulty-indicator {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="start-screen" class="start-screen">
            <h1 class="title">色差挑战</h1>
            <p class="description">测试你的色彩分辨能力！<br>找出那个颜色略有不同的色块</p>
            <div class="instructions">
                <h3>游戏规则</h3>
                <p>
                    • 在众多色块中找到颜色不同的那一个<br>
                    • 关卡越高，色块越多，差异越小<br>
                    • 你有3次机会，用完则游戏结束<br>
                    • 找得越快，得分越高
                </p>
            </div>
            <button class="btn btn-primary" id="start-btn">开始挑战</button>
        </div>
        
        <div id="game-screen">
            <div class="header">
                <h1 class="title">色差挑战</h1>
                <p class="subtitle">找出不同的色块</p>
            </div>
            
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="level">1</div>
                    <div class="stat-label">关卡</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">得分</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="best">0</div>
                    <div class="stat-label">最高</div>
                </div>
                <span class="combo-display" id="combo-display"></span>
            </div>
            
            <div class="lives" id="lives">
                <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            
            <div class="difficulty-indicator">
                <span class="difficulty-label">难度</span>
                <div class="difficulty-bar">
                    <div class="difficulty-fill" id="difficulty-fill" style="width: 10%"></div>
                </div>
            </div>
            
            <div class="game-board" id="game-board"></div>
            
            <p class="hint-text" id="hint-text">点击你认为不同的色块</p>
        </div>
    </div>
    
    <div class="message" id="message">
        <div class="message-title" id="message-title">游戏结束</div>
        <div class="message-text" id="message-text">你的得分: 0</div>
        <button class="btn btn-primary" id="restart-btn">再来一次</button>
    </div>
    
    <script src="src/game.js"></script>
</body>
</html>
